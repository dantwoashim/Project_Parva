<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project Parva Temporal Compass</title>
  <link rel="stylesheet" href="./shared.css" />
</head>
<body>
  <div class="widget-shell">
    <section class="widget-card">
      <header class="widget-header">
        <div>
          <p class="widget-eyebrow">Project Parva Embed</p>
          <h1 class="widget-title">Temporal Compass</h1>
          <p class="widget-subtitle" id="subtitle">Loading public-beta temporal state...</p>
        </div>
        <span class="widget-badge">Public Beta</span>
      </header>
      <div class="widget-body">
        <p class="widget-status" id="status">Loading...</p>
        <div class="widget-grid" id="summary" hidden>
          <article class="widget-panel">
            <p class="widget-label">Bikram Sambat</p>
            <p class="widget-value" id="bs-value">-</p>
          </article>
          <article class="widget-panel">
            <p class="widget-label">Tithi</p>
            <p class="widget-value" id="tithi-value">-</p>
          </article>
          <article class="widget-panel">
            <p class="widget-label">Nakshatra</p>
            <p class="widget-value" id="nakshatra-value">-</p>
          </article>
          <article class="widget-panel">
            <p class="widget-label">Current Muhurta</p>
            <p class="widget-value" id="muhurta-value">-</p>
          </article>
        </div>
        <ul class="widget-meta" id="meta" hidden>
          <li><span>Sunrise</span><strong id="sunrise-value">-</strong></li>
          <li><span>Sunset</span><strong id="sunset-value">-</strong></li>
          <li><span>Method</span><strong id="method-value">-</strong></li>
          <li><span>Trace</span><strong id="trace-value">-</strong></li>
        </ul>
        <p style="margin-top:16px;">
          <a class="widget-link" href="/" target="_blank" rel="noreferrer">Open full Project Parva app</a>
        </p>
      </div>
    </section>
  </div>
  <script>
    function todayIso(timeZone) {
      const formatter = new Intl.DateTimeFormat('en-CA', {
        timeZone,
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
      });
      const parts = Object.fromEntries(
        formatter.formatToParts(new Date()).map((part) => [part.type, part.value]),
      );
      return parts.year + '-' + parts.month + '-' + parts.day;
    }

    function params() {
      return new URLSearchParams(window.location.search);
    }

    function text(id, value) {
      document.getElementById(id).textContent = value || '-';
    }

    function formatBs(bs) {
      if (!bs) return '-';
      if (bs.formatted) return bs.formatted;
      if (bs.year && bs.month_name && bs.day) return bs.year + ' ' + bs.month_name + ' ' + bs.day;
      return '-';
    }

    function formatTime(value) {
      if (!value) return '-';
      try {
        return new Date(value).toLocaleTimeString('en-US', {
          hour: 'numeric',
          minute: '2-digit',
          hour12: true,
        });
      } catch {
        return value;
      }
    }

    async function loadWidget() {
      const query = params();
      const tz = query.get('tz') || 'Asia/Kathmandu';
      const payload = {
        date: query.get('date') || todayIso(tz),
        lat: query.get('lat') || '27.7172',
        lon: query.get('lon') || '85.3240',
        tz,
        quality_band: query.get('quality_band') || 'computed',
      };

      try {
        const response = await fetch('/v3/api/temporal/compass', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const envelope = await response.json();
        if (!response.ok) {
          throw new Error(envelope.detail || 'Request failed');
        }

        const data = envelope.data || envelope;
        const status = document.getElementById('status');
        status.hidden = true;
        document.getElementById('summary').hidden = false;
        document.getElementById('meta').hidden = false;
        document.getElementById('subtitle').textContent = payload.date + ' in ' + payload.tz;

        text('bs-value', formatBs(data.bikram_sambat));
        text('tithi-value', data.primary_readout && data.primary_readout.tithi_name);
        text('nakshatra-value', data.signals && data.signals.nakshatra && data.signals.nakshatra.name);
        text('muhurta-value', data.horizon && data.horizon.current_muhurta && data.horizon.current_muhurta.name);
        text('sunrise-value', formatTime(data.horizon && data.horizon.sunrise));
        text('sunset-value', formatTime(data.horizon && data.horizon.sunset));
        text('method-value', data.method_profile || data.method || '-');
        text('trace-value', data.calculation_trace_id || '-');
      } catch (error) {
        const status = document.getElementById('status');
        status.dataset.state = 'error';
        status.textContent = 'Unable to load widget: ' + (error && error.message ? error.message : String(error));
      }
    }

    loadWidget();
  </script>
</body>
</html>
