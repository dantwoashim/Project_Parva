name: parva-ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c requirements/constraints.txt -e .[test,dev]
          pip install -e sdk/python

      - name: Repository hygiene
        run: python scripts/release/check_repo_hygiene.py

      - name: Render blueprint
        run: python scripts/release/check_render_blueprint.py

      - name: Path leak check
        run: python scripts/check_path_leaks.py

      - name: Docs link check
        run: python scripts/check_docs_links.py

      - name: Backend lint
        run: ruff check backend tests scripts sdk

      - name: SDK package smoke
        run: python scripts/release/check_sdk_install.py

      - name: Backend type check
        run: mypy

      - name: Run backend test suite
        run: python -m pytest -q

  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend

      - name: Run frontend tests
        run: npm run test
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Check frontend bundle budget
        run: python scripts/release/check_frontend_bundle_budget.py

  environment-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Verify toolchain
        run: python scripts/verify_environment.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c requirements/constraints.txt -e .[test,dev]
          pip install -e sdk/python
          npm ci --prefix frontend

      - name: Build frontend from clean install
        run: npm --prefix frontend run build

      - name: Build clean source archive
        run: python scripts/release/package_source_archive.py

  browser-smoke:
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c requirements/constraints.txt -e .[test,dev]
          npm ci --prefix frontend

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Run browser smoke
        run: python scripts/run_browser_smoke.py

      - name: Run golden journeys
        run: python scripts/run_golden_journeys.py

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c requirements/constraints.txt -e .[test,dev]
          npm ci --prefix frontend

      - name: Run dependency audit
        run: python scripts/security/run_audit.py

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-audit
          path: reports/security_audit.json

  release-artifacts:
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality, browser-smoke, security-audit, environment-matrix]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c requirements/constraints.txt -e .[test,dev]
          pip install -e sdk/python

      - name: Contract freeze check
        run: python scripts/release/check_contract_freeze.py

      - name: Provenance readiness
        run: python scripts/release/check_provenance_readiness.py

      - name: SDK package smoke
        run: python scripts/release/check_sdk_install.py

      - name: Conformance suite
        run: python scripts/spec/run_conformance_tests.py

      - name: Generate precomputed artifacts
        run: python scripts/precompute/precompute_all.py --start-year 2026 --end-year 2027

      - name: Generate public-beta artifact pack
        run: python scripts/release/generate_public_beta_artifacts.py --target 300 --computed-target 300

      - name: Verify launch signoff document
        run: |
          python scripts/governance/verify_approval.py docs/LAUNCH_SIGNOFF.md \
            --require-reviewer Engineering \
            --require-reviewer QA \
            --require-reviewer Design \
            --require-reviewer Product

      - name: Build clean source archive
        run: python scripts/release/package_source_archive.py

      - name: Upload authority dashboard artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            dist/*-source.zip
            output/precomputed/*.json
            reports/accuracy/annual_accuracy_2082.json
            reports/authority_dashboard.json
            reports/conformance_report.json
            reports/release/month9_dossier.json
            reports/rule_ingestion_summary.json
            docs/public_beta/authority_dashboard.json
            docs/public_beta/authority_dashboard.md
            docs/public_beta/month9_release_dossier.md
            docs/LAUNCH_SIGNOFF.md
            docs/CLOSED_BETA_OPERATIONS.md
            docs/RELEASE_CANDIDATE_RUNBOOK.md
            docs/ROLLBACK_RUNBOOK.md
            docs/public_beta/release_candidate_dossier_template.md
