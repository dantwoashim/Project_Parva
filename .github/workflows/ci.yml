name: parva-ci

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:
    branches: ["main"]

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c requirements/constraints.txt -e .[test,dev]

      - name: Path leak check
        run: python scripts/check_path_leaks.py

      - name: Docs link check
        run: python scripts/check_docs_links.py

      - name: Backend lint
        run: ruff check backend tests scripts

      - name: Backend type check
        run: mypy

      - name: Run backend test suite
        run: python -m pytest -q

  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend

      - name: Run frontend tests
        run: npm run test
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c requirements/constraints.txt -e .[test,dev]
          npm ci --prefix frontend

      - name: Run dependency audit
        run: python scripts/security/run_audit.py

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-audit
          path: reports/security_audit.json

  release-artifacts:
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality, security-audit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c requirements/constraints.txt -e .[test,dev]

      - name: Contract freeze check
        run: python scripts/release/check_contract_freeze.py

      - name: Rule ingestion coverage check
        run: python scripts/rules/ingest_rule_sources.py --check --target 300

      - name: Conformance suite
        run: python scripts/spec/run_conformance_tests.py

      - name: Generate precomputed artifacts
        run: python scripts/precompute/precompute_all.py --start-year 2026 --end-year 2027

      - name: Generate accuracy report
        run: python scripts/generate_accuracy_report.py

      - name: Generate authority dashboard
        run: python scripts/generate_authority_dashboard.py

      - name: Generate release dossier
        run: python scripts/release/generate_month9_dossier.py

      - name: Build clean source archive
        run: python scripts/release/package_source_archive.py

      - name: Upload authority dashboard artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            dist/*-source.zip
            output/precomputed/*.json
            reports/accuracy/annual_accuracy_2082.json
            reports/authority_dashboard.json
            reports/conformance_report.json
            reports/release/month9_dossier.json
            reports/rule_ingestion_summary.json
            docs/public_beta/authority_dashboard.json
            docs/public_beta/authority_dashboard.md
            docs/public_beta/month9_release_dossier.md
